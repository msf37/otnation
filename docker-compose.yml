version: '3.9'
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: otnation
      POSTGRES_USER: otnation
      POSTGRES_PASSWORD: otnation
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U otnation"]
      interval: 5s
      timeout: 5s
      retries: 5

  platform:
    build: .
    ports:
      - "8080:8080"
    environment:
      CONFIG_FILE: /app/config.yaml
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./web:/app/web:ro
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
